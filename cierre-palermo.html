<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierre Palermo · Teque Onda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFC72C; --gold-dark: #c79500; --ink: #111111;
  --green: #00a82d; --green-bright: #00d838;
  --page: #f4f3ee; --card: #ffffff; --border: #e6e4db;
  --red: #e23b3b; --orange: #e07c14;
  --text: #222222; --muted: #888888; --cream: #eceae3;
  --fh: 'Bebas Neue', sans-serif;
  --fb: 'Fira Sans', sans-serif;
  --fc: 'Oswald', sans-serif;
  --cat-color: #888888; --cat-bg: #f8f7f5;
}

/* CATEGORY COLOR TOKENS */
.category[data-cat="POSTRES"]        { --cat-color:#9B6BE0; --cat-bg:#faf7fe; }
.category[data-cat="CACHITOS"]       { --cat-color:#E0A92C; --cat-bg:#fdfaf2; }
.category[data-cat="MINI_EMPANADAS"] { --cat-color:#3fae6e; --cat-bg:#f7fdf9; }
.category[data-cat="PASTELITOS"]     { --cat-color:#FF8A4C; --cat-bg:#fffaf6; }
.category[data-cat="TEQUEÑOS"]       { --cat-color:#FFC72C; --cat-bg:#fffdf5; }
.category[data-cat="BEBIDAS"]        { --cat-color:#3499c7; --cat-bg:#f4fbfe; }
.category[data-cat="SALSAS"]         { --cat-color:#D85A85; --cat-bg:#fef6f9; }
.category[data-cat="CAJAS"]          { --cat-color:#7a7a7a; --cat-bg:#f8f7f5; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--page); color: var(--text); font-family: var(--fb); min-height: 100vh; padding: 0 0 80px; }

/* ── HEADER ── */
header {
  background: var(--ink); border-bottom: 4px solid var();
  padding: 14px 16px 12px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
header h1 { font-family: var(--fh); font-size: 1.7rem; letter-spacing: 3px; color: #fff; line-height: 1; }
header h1 .onda { color: var(--gold); }
header .sub { font-size: 0.68rem; color: #aaa; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge { font-family: var(--fh); font-size: 0.95rem; color: var(--gold-dark); letter-spacing: 2px; }
.btn-settings {
  background: transparent; border: 1px solid rgba(255,199,44,0.35);
  border-radius: 7px; color: var(--gold); font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.5px; padding: 6px 12px; height: 34px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; white-space: nowrap; font-family: var(--fb);
}
.btn-settings:hover { background: var(--gold); color: var(--ink); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 7px; padding: 11px 14px; flex-wrap: wrap;
  align-items: center; background: var(--ink);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.filter-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: #999; font-family: var(--fb); font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.5px; padding: 5px 12px; border-radius: 20px;
  cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active        { background: var(--gold);   border-color: var(--gold);   color: var(--ink); }
.filter-btn.red.active    { background: var(--red);    border-color: var(--red);    color: #fff; }
.filter-btn.orange.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.filter-btn.green.active  { background: var(--gold);  border-color: var(--gold);  color: #fff; }
.filter-btn.grey.active   { background: #666; border-color: #666; color: #fff; }

/* ── CATEGORIES ── */
.category {
  margin: 12px 14px 0;
  border: 1px solid var(--border);
  border-left: 5px solid var(--cat-color);
  border-radius: 0 11px 11px 0;
  overflow: hidden;
  background: var(--cat-bg);
}
.cat-header {
  background: var(--ink); padding: 9px 14px;
  display: flex; align-items: center; gap: 10px;
}
.cat-header > span:first-child { font-size: 1rem; color: var(--cat-color); }
.cat-header > span:nth-child(2) {
  font-family: var(--fh); font-size: 1rem; letter-spacing: 2.5px;
  color: var(--cat-color); flex: 1;
}
.cat-count {
  margin-left: auto; font-family: var(--fb); font-size: 0.62rem;
  background: rgba(255,255,255,0.1); border-radius: 10px;
  padding: 2px 8px; color: #aaa; font-weight: 500;
}

/* ── PRODUCT ROWS ── */
.product-row {
  display: flex; align-items: center;
  padding: 9px 14px; border-top: 1px solid var(--border);
  gap: 10px; background: var(--card); transition: background 0.1s;
}
.product-row:hover { background: #fafaf8; }
.product-row.hidden { display: none !important; }
.product-row.confirmed { opacity: 0.55; background: #f5f4f1; }
.product-row.confirmed .prod-name { text-decoration: line-through; color: var(--muted); }
.prod-name { font-size: 0.82rem; font-weight: 500; flex: 1; color: var(--text); }
.prod-abbr {
  font-family: var(--fc); font-weight: 600; font-size: 0.68rem;
  letter-spacing: 1px; color: var(--ink); background: var(--cream);
  padding: 1px 6px; border-radius: 5px; margin-left: 4px;
}

/* ── QTY ── */
.qty-wrap {
  display: flex; align-items: center;
  background: var(--page); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.qty-btn {
  background: transparent; border: none; color: var(--muted);
  font-size: 1rem; width: 28px; height: 32px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; transition: color 0.1s;
}
.qty-btn:hover { color: var(--gold); }
.qty-btn:disabled { pointer-events: none; opacity: 0.3; }
.qty-input {
  background: transparent; border: none; color: var(--text);
  font-family: var(--fb); font-size: 0.88rem; font-weight: 700;
  width: 54px; text-align: center; outline: none; height: 32px;
}
.qty-input::-webkit-inner-spin-button { display: none; }
.qty-input:disabled { color: var(--muted); }
.unit-label { font-size: 0.62rem; color: var(--muted); min-width: 28px; }

/* ── BADGES ── */
.status-badge {
  font-size: 0.6rem; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  letter-spacing: 0.5px; text-transform: uppercase; min-width: 60px; text-align: center;
}
.status-badge.critical { background: rgba(226,59,59,0.1);  color: var(--red);    border: 1px solid rgba(226,59,59,0.3); }
.status-badge.warning  { background: rgba(224,124,20,0.1); color: var(--orange); border: 1px solid rgba(224,124,20,0.25); }
.status-badge.ok       { background: rgba(0,168,45,0.08);  color: var(--gold);  border: 1px solid rgba(0,168,45,0.25); }
.status-badge.done     { background: var(--cream); color: var(--muted); border: 1px solid var(--border); font-size: 0.58rem; }

/* ── ACTION BUTTONS ── */
.btn-confirm {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.72rem; padding: 5px 11px; border-radius: 6px;
  cursor: pointer; font-family: var(--fb); font-weight: 600;
  transition: all 0.15s; white-space: nowrap;
}
.btn-confirm:hover { border-color: var(--gold); color: var(--gold); background: rgba(0,168,45,0.05); }
.btn-edit {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-size: 0.68rem; padding: 5px 10px; border-radius: 6px;
  cursor: pointer; font-family: var(--fb); transition: all 0.15s; white-space: nowrap;
}
.btn-edit:hover { border-color: var(--gold-dark); color: var(--gold-dark); }

/* ── FREETEXT ── */
.product-row.freetext { flex-wrap: wrap; gap: 8px; }
.freetext-input {
  background: var(--page); border: 1px solid var(--border); color: var(--text);
  font-family: var(--fb); font-size: 0.82rem; padding: 6px 10px;
  border-radius: 8px; width: 130px; outline: none;
}
.freetext-input:focus { border-color: var(--gold); }
.freetext-input:disabled { color: var(--muted); pointer-events: none; }
.divider-confirmed { border: none; border-top: 1px dashed var(--border); margin: 0 14px; }
.thresh-note { font-size: 0.67rem; color: var(--muted); text-align: center; padding: 10px 16px 0; }

/* ── BOTTOM BAR ── */
.summary-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink); border-top: 3px solid var(--gold-dark);
  padding: 12px 16px; display: flex; gap: 10px; z-index: 200; align-items: center;
}
.summary-stats { display: flex; gap: 14px; align-items: center; flex: 1; flex-wrap: wrap; }
.stat-pill { font-size: 0.72rem; color: #bbb; }
.stat-pill b { color: #fff; }
.btn-generate {
  background: var(--gold); color: #fff; border: none;
  font-family: var(--fh); font-size: 1.05rem; letter-spacing: 2px;
  padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap;
}
.btn-generate:hover { background: #009926; }

/* ── MODAL WHATSAPP ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-bottom: none;
  border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
  padding: 20px 20px 30px; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-family: var(--fh); font-size: 1.3rem; letter-spacing: 2px; color: var(--ink); margin-bottom: 14px; }
.modal-text {
  background: var(--page); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; font-size: 0.78rem; line-height: 1.7; white-space: pre-wrap;
  font-family: 'Courier New', monospace; color: var(--text);
  max-height: 50vh; overflow-y: auto; margin-bottom: 14px;
}
.modal-actions { display: flex; gap: 10px; }
.btn-copy { flex: 1; background: var(--gold); color: #fff; border: none; font-family: var(--fh); font-size: 1rem; letter-spacing: 1px; padding: 11px; border-radius: 8px; cursor: pointer; }
.btn-close { background: var(--page); color: var(--text); border: 1px solid var(--border); font-family: var(--fb); font-size: 0.82rem; padding: 11px 18px; border-radius: 8px; cursor: pointer; }

/* ── SETTINGS ── */
.settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; flex-direction: column; align-items: center; justify-content: flex-end; }
.settings-overlay.open { display: flex; }
.settings-panel { background: var(--card); width: 100%; max-width: 600px; border-radius: 16px 16px 0 0; max-height: 90vh; display: flex; flex-direction: column; }
.settings-header {
  background: var(--ink); border-radius: 16px 16px 0 0;
  border-bottom: 3px solid var(--gold);
  padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.settings-header h2 { font-family: var(--fh); font-size: 1.3rem; letter-spacing: 2px; color: #fff; }
.settings-subtitle { font-size: 0.68rem; color: #aaa; margin-top: 2px; }
.btn-close-settings {
  background: var(--gold-dark); border: none; color: #fff;
  font-family: var(--fb); font-size: 0.8rem; font-weight: 600;
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
}
.settings-body { flex: 1; overflow-y: auto; padding: 12px 16px 30px; background: var(--page); }
.settings-cat-title {
  font-family: var(--fh); font-size: 0.95rem; letter-spacing: 2px;
  color: var(--ink); padding: 12px 0 6px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 2px solid var(--border); margin-bottom: 6px;
}
.settings-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; margin-bottom: 4px;
  background: var(--card); border-radius: 8px;
  border: 1px solid var(--border);
}
.settings-prod-name { font-size: 0.8rem; font-weight: 500; flex: 1; color: var(--text); }
.settings-prod-abbr {
  font-family: var(--fc); font-weight: 600; font-size: 0.65rem;
  color: var(--ink); background: var(--cream);
  padding: 1px 6px; border-radius: 4px; display: inline-block; margin-top: 2px;
}
.thresh-group { display: flex; align-items: center; gap: 6px; }
.thresh-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; min-width: 18px; }
.thresh-input {
  background: var(--page); border: 1px solid var(--border); color: var(--text);
  font-family: var(--fb); font-size: 0.82rem; font-weight: 600;
  width: 52px; text-align: center; padding: 5px 4px; border-radius: 6px; outline: none;
}
.thresh-input:focus { border-color: var(--gold); }
.thresh-input::-webkit-inner-spin-button { display: none; }
.settings-save-note { font-size: 0.68rem; color: var(--muted); text-align: center; padding: 16px 0 0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🧀 TEQUE <span class="onda">ONDA</span></h1>
    <div class="sub">Cierre · Palermo Bonpland</div>
  </div>
  <div class="header-right">
    <div class="date-badge" id="dateBadge"></div>
    <button class="btn-settings" onclick="openSettings()">⚙ Config</button>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" data-filter="all"      onclick="setFilter('all',this)">Todo</button>
  <button class="filter-btn red"    data-filter="critical" onclick="setFilter('critical',this)">🔴 Crítico</button>
  <button class="filter-btn orange" data-filter="warning"  onclick="setFilter('warning',this)">🟡 Bajo</button>
  <button class="filter-btn green"  data-filter="ok"       onclick="setFilter('ok',this)">🟢 OK</button>
  <button class="filter-btn grey"   data-filter="pending"  onclick="setFilter('pending',this)">⬜ Pendientes</button>
</div>

<div id="app"></div>
<p class="thresh-note">Confirmá cada ítem al contarlo · ✎ editar para corregir · ⚙ Config para ajustar umbrales</p>

<div class="summary-panel">
  <div class="summary-stats">
    <span class="stat-pill">🔴 <b id="cCrit">0</b></span>
    <span class="stat-pill">🟡 <b id="cWarn">0</b></span>
    <span class="stat-pill">🟢 <b id="cOk">0</b></span>
    <span class="stat-pill">✅ <b id="cDone">0</b>/<b id="cTotal">0</b></span>
  </div>
  <button class="btn-generate" onclick="openModal()">📋 GENERAR</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">📲 MENSAJE WHATSAPP</div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copyText()">📋 COPIAR</button>
      <button class="btn-close" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-header">
      <div>
        <h2>⚙️ UMBRALES DE STOCK</h2>
        <div class="settings-subtitle">Los cambios se aplican al instante y se guardan</div>
      </div>
      <button class="btn-close-settings" onclick="closeSettings()">✓ Listo</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>
</div>

<script>
const catalog = [
  { id:'choco',    cat:'POSTRES',        label:'Chocolate',               abbr:'CHOCO',          unit:'unid', val:0,   critAt:3,  warnAt:10 },
  { id:'leches',   cat:'POSTRES',        label:'Leches',                  abbr:'LECHES',         unit:'unid', val:15,  critAt:5,  warnAt:20 },
  { id:'cachitos', cat:'CACHITOS',       label:'Cachitos',                abbr:'CACHITOS',       unit:'und',  val:0,   critAt:5,  warnAt:20 },
  { id:'eme',      cat:'MINI EMPANADAS', label:'Empanada Mechada',        abbr:'EME',            unit:'und',  val:0,   critAt:5,  warnAt:25 },
  { id:'emo',      cat:'MINI EMPANADAS', label:'Empanada Molida',         abbr:'EMO',            unit:'und',  val:38,  critAt:5,  warnAt:25 },
  { id:'epo',      cat:'MINI EMPANADAS', label:'Empanada Pollo',         abbr:'EPO',            unit:'und',  val:0,   critAt:5,  warnAt:25 },
  { id:'ejq',      cat:'MINI EMPANADAS', label:'Empanada Jamón y Queso',  abbr:'EJQ',            unit:'und',  val:37,  critAt:5,  warnAt:25 },
  { id:'eq',       cat:'MINI EMPANADAS', label:'Empanada Queso',          abbr:'EQ',             unit:'und',  val:69,  critAt:10, warnAt:40 },
  { id:'edm',      cat:'MINI EMPANADAS', label:'Empanada Dominó',         abbr:'EDM',            unit:'und',  val:51,  critAt:10, warnAt:40 },
  { id:'epa',      cat:'MINI EMPANADAS', label:'Empanada Pabellón',       abbr:'EPA',            unit:'und',  val:20,  critAt:5,  warnAt:30 },
  { id:'pme',      cat:'PASTELITOS',     label:'Pastelito Mechada',       abbr:'PME',            unit:'und',  val:50,  critAt:10, warnAt:30 },
  { id:'pmo',      cat:'PASTELITOS',     label:'Pastelito Molida',        abbr:'PMO',            unit:'und',  val:26,  critAt:10, warnAt:30 },
  { id:'ppo',      cat:'PASTELITOS',     label:'Pastelito Pollo',         abbr:'PPO',            unit:'und',  val:0,   critAt:5,  warnAt:25 },
  { id:'ppz',      cat:'PASTELITOS',     label:'Pastelito Pizza',         abbr:'PPZ',            unit:'und',  val:68,  critAt:10, warnAt:35 },
  { id:'pq',       cat:'PASTELITOS',     label:'Pastelito Queso',         abbr:'PQ',             unit:'und',  val:11,  critAt:5,  warnAt:25 },
  { id:'ppa',      cat:'PASTELITOS',     label:'Pastelito Papa y Queso',  abbr:'PPA',            unit:'und',  val:111, critAt:10, warnAt:40 },
  { id:'pjq',      cat:'PASTELITOS',     label:'Pastelito Jamón y Queso', abbr:'PJQ',            unit:'und',  val:47,  critAt:10, warnAt:30 },
  { id:'to',       cat:'TEQUEÑOS',       label:'Tequeño Original',        abbr:'TO',             unit:'und',  val:83,  critAt:20, warnAt:50, isFree:true },
  { id:'tf',       cat:'TEQUEÑOS',       label:'Tequeño Fiestero',        abbr:'TF',             unit:'und',  val:18,  critAt:10, warnAt:30 },
  { id:'tjq',      cat:'TEQUEÑOS',       label:'Tequeño Jamón y Queso',   abbr:'TJQ',            unit:'und',  val:7,   critAt:5,  warnAt:20, isFree:true },
  { id:'tyo',      cat:'TEQUEÑOS',       label:'Tequeño Plátano y Queso', abbr:'TYO',            unit:'und',  val:16,  critAt:5,  warnAt:25 },
  { id:'malta58',  cat:'BEBIDAS',        label:'Malta 58',                abbr:'MALTAS 58',      unit:'und',  val:44,  critAt:10, warnAt:20 },
  { id:'maltapeq', cat:'BEBIDAS',        label:'Malta Reko Pequeña',      abbr:'MALTA REKO Peq', unit:'und',  val:9,   critAt:5,  warnAt:15 },
  { id:'maltagde', cat:'BEBIDAS',        label:'Malta Reko Grande',       abbr:'MALTA REKO Gde', unit:'und',  val:0,   critAt:3,  warnAt:10 },
  { id:'te',       cat:'BEBIDAS',        label:'Té',                      abbr:'TE',             unit:'und',  val:56,  critAt:10, warnAt:25 },
  { id:'mayo',     cat:'SALSAS',         label:'Mayonesa',                abbr:'MAYONESA',       unit:'',     val:null, isFree:true, freeVal:'', critAt:null, warnAt:null, freeCritAt:2,    freeUnit:'bolsas' },
  { id:'mojito',   cat:'SALSAS',         label:'Mojito Ajo 🧄',           abbr:'MOJITO',         unit:'',     val:null, isFree:true, freeVal:'', critAt:null, warnAt:null, freeCritAt:0.25, freeUnit:'taza' },
  { id:'picante',  cat:'SALSAS',         label:'Picante 🌶️',              abbr:'PICANTE',        unit:'und',  val:8,   critAt:5,  warnAt:15 },
  { id:'cajap',    cat:'CAJAS',          label:'Caja Pequeña',            abbr:'CAJA P',         unit:'und',  val:85,  critAt:20, warnAt:100 },
  { id:'cajag',    cat:'CAJAS',          label:'Caja Grande',             abbr:'CAJA G',         unit:'und',  val:68,  critAt:20, warnAt:80 },
];

let thresholds = {};
catalog.forEach(p => { thresholds[p.id] = { critAt: p.critAt, warnAt: p.warnAt, freeCritAt: p.freeCritAt ?? null }; });

let state = {};
catalog.forEach(p => { state[p.id] = { val: p.val ?? 0, freeVal: p.freeVal || '', confirmed: false }; });

// ── PERSIST THRESHOLDS ────────────────────────────────────────────────────
function saveThresholds() {
  try { localStorage.setItem('tequeonda_thresholds', JSON.stringify(thresholds)); } catch(e) {}
}
function loadThresholds() {
  try {
    const saved = localStorage.getItem('tequeonda_thresholds');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(id => { if (thresholds[id]) thresholds[id] = parsed[id]; });
    }
  } catch(e) {}
}
loadThresholds();

let currentFilter = 'all';

// ── PARSERS ───────────────────────────────────────────────────────────────
function parseMayonesa(fv) {
  if (!fv) return 0;
  fv = fv.toLowerCase().replace(/bolsas?/gi,'').replace(/\s+/g,' ').trim();
  const fracMap = {'1/2':0.5,'1/3':0.33,'2/3':0.67,'1/4':0.25,'3/4':0.75};
  let total = 0;
  for (const [k,v] of Object.entries(fracMap)) { if (fv.includes(k)) { total += v; fv = fv.replace(k,''); } }
  fv = fv.replace(/\bb\b/gi,'').replace(/b$/i,'').trim();
  const num = parseFloat(fv.replace(/[^0-9.]/g,''));
  if (!isNaN(num)) total += num;
  return total;
}
function parseMojito(fv) {
  if (!fv) return 0;
  fv = fv.toLowerCase().replace(/tazas?/g,'').trim();
  const fracMap = {'1/8':0.125,'1/4':0.25,'3/8':0.375,'1/2':0.5,'3/4':0.75,'1/3':0.33,'2/3':0.67};
  for (const [k,v] of Object.entries(fracMap)) { if (fv.includes(k)) return v; }
  const num = parseFloat(fv);
  return isNaN(num) ? 0 : num;
}

// ── STATUS ────────────────────────────────────────────────────────────────
function getStatus(p) {
  const t = thresholds[p.id];
  if (t.critAt === null) {
    const fv = (state[p.id].freeVal || '').trim();
    if (!fv || fv === '0') return 'critical';
    const critAt = t.freeCritAt ?? 0;
    let parsed = 0;
    if (p.id === 'mayo')   parsed = parseMayonesa(fv);
    if (p.id === 'mojito') parsed = parseMojito(fv);
    return parsed <= critAt ? 'critical' : 'ok';
  }
  const v = Number(state[p.id].val);
  if (v <= t.critAt) return 'critical';
  if (v <= t.warnAt) return 'warning';
  return 'ok';
}
function badgeText(st) {
  return st==='critical' ? '🔴 CRÍTICO' : st==='warning' ? '🟡 BAJO' : '🟢 OK';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function confirmItem(id) { state[id].confirmed = true; render(); }
function editItem(id) {
  state[id].confirmed = false; render();
  setTimeout(() => { const inp = document.getElementById('input-'+id); if (inp) { inp.focus(); inp.select(); } }, 50);
}
function updateQty(id, val) { state[id].val = val==='' ? 0 : Number(val); updateStats(); }
function adjustQty(id, delta) {
  state[id].val = Math.max(0, (Number(state[id].val)||0)+delta);
  const inp = document.getElementById('input-'+id); if (inp) inp.value = state[id].val;
  updateStats();
}
function updateFree(id, val) {
  state[id].freeVal = val;
  const p = catalog.find(x=>x.id===id);
  const st = getStatus(p);
  const badge = document.getElementById('badge-'+id);
  if (badge && !state[id].confirmed) { badge.className='status-badge '+st; badge.textContent=badgeText(st); }
  const row = document.querySelector('[data-id="'+id+'"]');
  if (row) row.dataset.status = st;
  updateStats();
}

// ── FILTER ────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}
function applyFilter() {
  document.querySelectorAll('.product-row').forEach(row => {
    const st=row.dataset.status, done=row.dataset.confirmed==='true';
    let show = currentFilter==='all' ? true : currentFilter==='pending' ? !done : st===currentFilter;
    row.classList.toggle('hidden',!show);
  });
}

// ── STATS ─────────────────────────────────────────────────────────────────
function updateStats() {
  let crit=0,warn=0,ok=0,done=0;
  catalog.forEach(p => {
    const st=getStatus(p);
    if(st==='critical')crit++; else if(st==='warning')warn++; else ok++;
    if(state[p.id].confirmed)done++;
  });
  document.getElementById('cCrit').textContent=crit;
  document.getElementById('cWarn').textContent=warn;
  document.getElementById('cOk').textContent=ok;
  document.getElementById('cDone').textContent=done;
  document.getElementById('cTotal').textContent=catalog.length;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function catIcon(cat) {
  return {POSTRES:'🍫',CACHITOS:'🥐','MINI EMPANADAS':'🥟',PASTELITOS:'🫓',TEQUEÑOS:'🧀',BEBIDAS:'🍺',SALSAS:'🫙',CAJAS:'📦'}[cat]||'📌';
}

function buildRow(p) {
  const st=getStatus(p), done=state[p.id].confirmed;
  const isNoThresh = p.isFree && thresholds[p.id].critAt===null;
  const badge = done
    ? `<span class="status-badge done">✓ listo</span>`
    : `<span class="status-badge ${st}" id="badge-${p.id}">${badgeText(st)}</span>`;
  const actionBtn = done
    ? `<button class="btn-edit" onclick="editItem('${p.id}')">✎ editar</button>`
    : `<button class="btn-confirm" onclick="confirmItem('${p.id}')">✓ listo</button>`;
  if (isNoThresh) {
    return `<div class="product-row freetext ${done?'confirmed':''}" data-status="${st}" data-confirmed="${done}" data-id="${p.id}">
      <div class="prod-name">${p.label} <span class="prod-abbr">${p.abbr}</span></div>
      <input class="freetext-input" type="text" placeholder="ej: 5B y 1/2" value="${state[p.id].freeVal}"
        oninput="updateFree('${p.id}',this.value)" ${done?'disabled':''}>${badge}${actionBtn}</div>`;
  }
  const dis=done?'disabled':'';
  return `<div class="product-row ${done?'confirmed':''}" data-status="${st}" data-confirmed="${done}" data-id="${p.id}">
    <div class="prod-name">${p.label} <span class="prod-abbr">${p.abbr}</span></div>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="adjustQty('${p.id}',-1)" ${dis}>−</button>
      <input class="qty-input" type="number" min="0" value="${state[p.id].val??0}"
        oninput="updateQty('${p.id}',this.value)" id="input-${p.id}" ${dis}>
      <button class="qty-btn" onclick="adjustQty('${p.id}',1)" ${dis}>+</button>
    </div>
    <span class="unit-label">${p.unit}</span>${badge}${actionBtn}</div>`;
}

function render() {
  const cats=[...new Set(catalog.map(p=>p.cat))];
  let html='';
  cats.forEach(cat => {
    const products=catalog.filter(p=>p.cat===cat);
    const pending=products.filter(p=>!state[p.id].confirmed);
    const confirmed=products.filter(p=>state[p.id].confirmed);
    const dataCat=cat.replace(/\s/g,'_');
    html+=`<div class="category" data-cat="${dataCat}">
      <div class="cat-header">
        <span>${catIcon(cat)}</span>
        <span>${cat}</span>
        <span class="cat-count">${products.length} items</span>
      </div>`;
    pending.forEach(p=>{html+=buildRow(p);});
    if(confirmed.length){html+=`<hr class="divider-confirmed">`;confirmed.forEach(p=>{html+=buildRow(p);});}
    html+=`</div>`;
  });
  document.getElementById('app').innerHTML=html;
  applyFilter(); updateStats();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function openSettings() { renderSettings(); document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); render(); }

function renderSettings() {
  const cats=[...new Set(catalog.map(p=>p.cat))];
  let html='';
  cats.forEach(cat => {
    html+=`<div><div class="settings-cat-title">${catIcon(cat)} ${cat}</div>`;
    catalog.filter(p=>p.cat===cat).forEach(p => {
      const t=thresholds[p.id];
      const isNoThresh = p.isFree && t.critAt===null;
      if (isNoThresh) {
        html+=`<div class="settings-row">
          <div class="settings-prod-name">${p.label}<span class="settings-prod-abbr">${p.abbr}</span></div>
          <select id="st-free-${p.id}" onchange="updateFreeThresh('${p.id}',this.value)"
            style="background:#f4f3ee;border:1px solid #e6e4db;color:#222;font-family:'Fira Sans',sans-serif;font-size:0.8rem;padding:5px 8px;border-radius:6px;outline:none;">
            ${p.id==='mayo' ? `
              <option value="1" ${(t.freeCritAt??2)<=1?'selected':''}>≤ 1 bolsa</option>
              <option value="2" ${(t.freeCritAt??2)===2?'selected':''}>≤ 2 bolsas</option>
              <option value="3" ${(t.freeCritAt??2)===3?'selected':''}>≤ 3 bolsas</option>
              <option value="4" ${(t.freeCritAt??2)===4?'selected':''}>≤ 4 bolsas</option>
            ` : `
              <option value="0.125" ${(t.freeCritAt??0.25)<=0.125?'selected':''}>≤ 1/8 taza</option>
              <option value="0.25"  ${(t.freeCritAt??0.25)===0.25?'selected':''}>≤ 1/4 taza</option>
              <option value="0.375" ${(t.freeCritAt??0.25)===0.375?'selected':''}>≤ 3/8 taza</option>
              <option value="0.5"   ${(t.freeCritAt??0.25)===0.5?'selected':''}>≤ 1/2 taza</option>
            `}
          </select>
        </div>`;
      } else {
        html+=`<div class="settings-row">
          <div class="settings-prod-name">${p.label}<span class="settings-prod-abbr">${p.abbr} · ${p.unit}</span></div>
          <div class="thresh-group">
            <span class="thresh-label">🔴</span>
            <input class="thresh-input" type="number" min="0" value="${t.critAt??0}" onchange="updateThresh('${p.id}','critAt',this.value)">
            <span class="thresh-label">🟡</span>
            <input class="thresh-input" type="number" min="0" value="${t.warnAt??0}" onchange="updateThresh('${p.id}','warnAt',this.value)">
          </div>
        </div>`;
      }
    });
    html+=`</div>`;
  });
  html+=`<p class="settings-save-note">🔴 Crítico ≤ valor · 🟡 Bajo ≤ valor · Cambios instantáneos</p>`;
  document.getElementById('settingsBody').innerHTML=html;
}

function updateThresh(id, field, val) {
  thresholds[id][field] = Number(val);
  if (thresholds[id].critAt > thresholds[id].warnAt) thresholds[id].warnAt = thresholds[id].critAt;
  saveThresholds(); updateStats();
}
function updateFreeThresh(id, val) { thresholds[id].freeCritAt = parseFloat(val); saveThresholds(); updateStats(); }

// ── GENERATE ──────────────────────────────────────────────────────────────
function generateMsg() {
  const cats=[...new Set(catalog.map(p=>p.cat))];
  const dateStr=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  let msg=`🏪 *CIERRE PALERMO · ${dateStr.toUpperCase()}*\n\n`;
  cats.forEach(cat => {
    msg+=`*${cat}*\n`;
    catalog.filter(p=>p.cat===cat).forEach(p => {
      const st=getStatus(p);
      const icon=st==='critical'?'❌':st==='warning'?'⚠️':'✅';
      if(thresholds[p.id].critAt===null) msg+=`${icon} ${p.abbr}: ${state[p.id].freeVal||'—'}\n`;
      else msg+=`${icon} ${p.abbr}: ${state[p.id].val??0}${p.unit?' '+p.unit:''}\n`;
    });
    msg+='\n';
  });
  const crits=catalog.filter(p=>getStatus(p)==='critical');
  const warns=catalog.filter(p=>getStatus(p)==='warning');
  if(crits.length||warns.length){
    msg+=`📋 *PRIORIDAD REPOSICIÓN*\n`;
    if(crits.length){
      msg+=`\n❌ *CRÍTICO*\n`;
      crits.forEach(p=>{
        const val=thresholds[p.id].critAt===null?(state[p.id].freeVal||'—'):`${state[p.id].val??0}${p.unit?' '+p.unit:''}`;
        msg+=`   • ${p.abbr}: ${val}\n`;
      });
    }
    if(warns.length){
      msg+=`\n⚠️ *BAJO*\n`;
      warns.forEach(p=>{
        const val=thresholds[p.id].critAt===null?(state[p.id].freeVal||'—'):`${state[p.id].val??0}${p.unit?' '+p.unit:''}`;
        msg+=`   • ${p.abbr}: ${val}\n`;
      });
    }
  }
  return msg;
}

function openModal()  { document.getElementById('modalText').textContent=generateMsg(); document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function copyText() {
  const text=document.getElementById('modalText').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(flashCopied).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:16px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); flashCopied(); }catch(e){ alert('Copiá el texto manualmente:\n\n'+text); }
  document.body.removeChild(ta);
}
function flashCopied() {
  const btn=document.querySelector('.btn-copy');
  btn.textContent='✅ COPIADO'; setTimeout(()=>btn.textContent='📋 COPIAR',2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
render();
</script>
