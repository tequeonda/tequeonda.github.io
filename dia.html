<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Día de Hoy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4860A; --gold-dim: #9a5f08;
    --bg: #0f0e0b; --surface: #1a1814; --border: #2e2a20;
    --done-bg: #141a10; --done-text: #4a5e3a;
    --proj: #0e1f08; --proj-border: #5a9e0a; --proj-accent: #7bd11a;
    --proj-dim: #5a8a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #e8e0cc; font-family: 'Fira Sans', sans-serif; min-height: 100vh; padding: 28px 20px 100px; user-select: none; -webkit-user-select: none; }
  header { margin-bottom: 20px; }
  .fecha { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px; color: var(--gold-dim); margin-bottom: 4px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; color: var(--gold); line-height: 1; }
  .progress-bar-wrap { margin-top: 12px; background: var(--border); border-radius: 2px; height: 3px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--gold); transition: width 0.5s ease; border-radius: 2px; }
  .progress-label { font-size: 11px; color: var(--gold-dim); margin-top: 6px; letter-spacing: 1px; }

  /* VOICE */
  .voice-section { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
  .voice-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; padding: 13px 20px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .voice-btn.recording { border-color: #c04040; background: #1a1010; color: #e06060; animation: pulse 1s infinite; }
  .voice-btn.loading { border-color: var(--gold-dim); color: var(--gold-dim); pointer-events: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .voice-status { font-size: 12px; color: var(--gold-dim); text-align: center; min-height: 16px; }
  .voice-status.error { color: #c04040; }

  /* SECTION LABEL */
  .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px; color: var(--gold-dim); margin: 20px 0 8px; }

  /* TASKS */
  .tasks { display: flex; flex-direction: column; gap: 8px; }

  .task {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 13px 12px; display: flex; align-items: center; gap: 10px;
    position: relative; touch-action: pan-y; -webkit-tap-highlight-color: transparent;
    overflow: hidden; transition: border-color 0.2s, background 0.3s;
  }
  .task.done { background: var(--done-bg); border-color: #2a3520; }
  .task.done .task-label { color: var(--done-text); text-decoration: line-through; text-decoration-color: #3a4e2a; }
  .task.done .task-num { color: #3a4e2a; }
  .task.dragging { opacity: 0.45; transform: scale(0.97); }
  .task.drag-over { border-color: var(--gold); }
  .task.ghost { position: fixed; z-index: 1000; pointer-events: none; box-shadow: 0 12px 32px rgba(0,0,0,0.7); opacity: 0.95; transform: rotate(1.5deg) scale(1.02); transition: none; }

  /* action menu overlay - swipe left to reveal */
  .task-actions {
    position: absolute; right: 0; top: 0; bottom: 0;
    display: flex; align-items: stretch;
    transform: translateX(100%);
    transition: transform 0.22s ease;
  }
  .task.show-actions .task-actions { transform: translateX(0); }
  .task.show-actions .task-body,
  .task.show-actions .checkbox,
  .task.show-actions .drag-handle,
  .task.show-actions .task-num { pointer-events: none; }
  .action-btn {
    display: flex; align-items: center; justify-content: center;
    width: 52px; font-size: 18px; border: none; cursor: pointer; flex-shrink: 0;
  }
  .action-edit { background: #2a4a7a; }
  .action-delete { background: #7a2a2a; }

  .drag-handle { color: #3a3528; font-size: 15px; flex-shrink: 0; }
  .task.done .drag-handle { color: #2a3020; }
  .checkbox { width: 21px; height: 21px; border: 2px solid var(--gold-dim); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, border-color 0.2s; cursor: pointer; }
  .task.done .checkbox { background: #4a7a3a; border-color: #4a7a3a; }
  .checkmark { display: none; color: #fff; font-size: 12px; font-weight: 700; }
  .task.done .checkmark { display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-num { font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--gold-dim); margin-bottom: 1px; }
  .task-label { font-size: 17px; color: #e8e0cc; line-height: 1.35; word-break: break-word; transition: color 0.3s; }

  /* PROJECTS */
  .projects { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }

  .project-card {
    background: var(--proj); border: 1px solid var(--proj-border);
    border-radius: 10px; overflow: hidden;
  }
  .project-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 14px 12px; cursor: pointer;
  }
  .project-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--proj-accent); flex-shrink: 0; }
  .project-name { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 1px; color: var(--proj-accent); flex: 1; }
  .project-count { font-size: 11px; color: var(--proj-dim); letter-spacing: 1px; }
  .project-toggle { font-size: 12px; color: var(--proj-dim); transition: transform 0.2s; }
  .project-card.collapsed .project-toggle { transform: rotate(-90deg); }

  .project-body { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 7px; }
  .project-card.collapsed .project-body { display: none; }

  .subtask {
    background: #111f08; border: 1px solid #3a6010; border-radius: 6px;
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
    touch-action: pan-y; -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden; transition: background 0.2s;
  }
  .subtask.done { background: #0c1806; border-color: #2a4a10; }
  .subtask.done .subtask-label { color: #4a6a30; text-decoration: line-through; text-decoration-color: #2a4a10; }
  .sub-checkbox { width: 19px; height: 19px; border: 2px solid var(--proj-dim); border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background 0.2s; }
  .subtask.done .sub-checkbox { background: var(--proj-dim); border-color: var(--proj-dim); }
  .sub-check { display: none; color: #fff; font-size: 11px; font-weight: 700; }
  .subtask.done .sub-check { display: block; }
  .subtask-label { font-size: 15px; color: #b8e090; flex: 1; word-break: break-word; }
  .subtask-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; transform: translateX(100%); transition: transform 0.22s; }
  .subtask.show-actions .subtask-actions { transform: translateX(0); }

  .project-add { display: flex; gap: 8px; margin-top: 4px; }
  .project-add input { flex: 1; background: #0e1808; border: 1px solid #3a6010; border-radius: 5px; color: #b8e090; font-family: 'Fira Sans', sans-serif; font-size: 13px; padding: 8px 10px; outline: none; }
  .project-add input::placeholder { color: #3a5a20; }
  .project-add button { background: var(--proj-dim); border: none; border-radius: 5px; color: #fff; font-size: 16px; width: 36px; cursor: pointer; }

  /* Project swipe actions */
  .project-card { position: relative; overflow: hidden; transition: border-color 0.2s; touch-action: pan-y; }
  .project-header { position: relative; }
  .proj-actions {
    position: absolute; right: 0; top: 0; bottom: 0;
    display: flex; align-items: stretch;
    transform: translateX(100%);
    transition: transform 0.22s ease;
    z-index: 10;
  }
  .project-card.show-proj-actions .proj-actions { transform: translateX(0); }
  .project-card.show-proj-actions .project-name,
  .project-card.show-proj-actions .project-count,
  .project-card.show-proj-actions .project-toggle { opacity: 0.3; }
  .project-card.dragging-proj { opacity: 0.45; transform: scale(0.97); }
  .project-card.drag-over-proj { border-color: var(--proj-accent); }
  .ghost-proj { position: fixed; z-index: 1000; pointer-events: none; box-shadow: 0 12px 32px rgba(0,0,0,0.7); opacity: 0.95; transform: rotate(1deg) scale(1.02); transition: none; border-radius: 10px; }

  .add-project-btn { width: 100%; background: none; border: 1px dashed var(--proj-border); border-radius: 8px; color: var(--proj-dim); font-family: 'Fira Sans', sans-serif; font-size: 13px; padding: 12px; cursor: pointer; letter-spacing: 1px; margin-top: 4px; }
  .add-project-btn:active { border-color: var(--proj-accent); color: var(--proj-accent); }

  /* ADD TASK */
  .add-section { margin-top: 20px; display: flex; gap: 10px; }
  input[type="text"] { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: #e8e0cc; font-family: 'Fira Sans', sans-serif; font-size: 14px; padding: 11px 13px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--gold-dim); }
  input[type="text"]::placeholder { color: #4a4535; }
  button.add-btn { background: var(--gold); border: none; border-radius: 6px; color: #0f0e0b; font-family: 'Bebas Neue', sans-serif; font-size: 20px; padding: 0 18px; cursor: pointer; }

  .hint { font-size: 11px; color: #3a3528; margin-top: 12px; text-align: center; }
  .reset-btn { display: block; margin: 10px auto 0; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--gold-dim); font-family: 'Fira Sans', sans-serif; font-size: 12px; padding: 7px 16px; cursor: pointer; }

  .all-done { display: none; text-align: center; margin-top: 30px; font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); letter-spacing: 2px; animation: fadeIn 0.8s forwards; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* EDIT MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 24px; }
  .modal-bg.open { display: flex; }
  .modal { background: #1e1c17; border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: 100%; max-width: 400px; }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 20px; letter-spacing: 1px; margin-bottom: 14px; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: #e8e0cc; font-family: 'Fira Sans', sans-serif; font-size: 15px; padding: 11px 13px; outline: none; margin-bottom: 14px; }
  .modal input:focus { border-color: var(--gold-dim); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btns button { border: none; border-radius: 6px; padding: 9px 18px; font-family: 'Fira Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-cancel { background: var(--border); color: #e8e0cc; }
  .btn-save { background: var(--gold); color: #0f0e0b; font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="fecha" id="fecha"></div>
  <h1>HOY</h1>
  <div class="progress-bar-wrap"><div class="progress-bar" id="bar" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">0 de 0 tareas</div>
</header>

<div class="voice-section">
  <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">
    <span>🎙️</span><span id="voice-lbl">DICTAR TAREAS DEL DÍA</span>
  </button>
  <div class="voice-status" id="voice-status"></div>
</div>

<div id="app"></div>

<div class="add-section">
  <input type="text" id="nueva" placeholder="Agregar tarea del día..." />
  <button class="add-btn" onclick="agregarTarea()">+</button>
</div>

<div class="hint">Deslizá a la izquierda → editar/eliminar · Pulsá largo → mover · Tocá → tildar</div>
<button class="reset-btn" onclick="resetearDia()">↺ Nuevo día</button>
<div class="all-done" id="all-done">¡Todo listo! 🔥</div>

<!-- Edit modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">EDITAR TAREA</h3>
    <input type="text" id="modal-input" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
  // DATE
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const hoy = new Date();
  document.getElementById('fecha').textContent = dias[hoy.getDay()] + ' ' + hoy.getDate() + ' de ' + meses[hoy.getMonth()];

  // STORAGE
  function save() {
    try { localStorage.setItem('tareas_dia', JSON.stringify(tareas)); } catch(e) {}
    try { localStorage.setItem('proyectos_dia', JSON.stringify(proyectos)); } catch(e) {}
  }
  function load() {
    let t = [], p = [];
    try { const g = localStorage.getItem('tareas_dia'); if (g) t = JSON.parse(g); } catch(e) {}
    try { const g = localStorage.getItem('proyectos_dia'); if (g) p = JSON.parse(g); } catch(e) {}
    return { t, p };
  }

  const stored = load();
  let tareas = stored.t;
  let proyectos = stored.p; // [{id, nombre, collapsed, subtareas:[{id,texto,done}]}]
  let nextId = tareas.length > 0 ? Math.max(...tareas.map(t => t.id)) + 1 : 0;
  let nextProjId = proyectos.length > 0 ? Math.max(...proyectos.map(p => p.id)) + 1 : 0;

  // DRAG
  let dragId=null, ghost=null, ghostOffsetY=0, longPressTimer=null, isDragging=false, startY=0;
  // LONG PRESS for actions
  let actionTimer=null, actionEl=null, actionMoved=false;

  // MODAL
  let modalCallback = null;
  function openModal(title, val, cb) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-input').value = val;
    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('modal-input').focus(), 100);
    modalCallback = cb;
  }
  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); modalCallback = null; }
  function saveModal() {
    const val = document.getElementById('modal-input').value.trim();
    if (val && modalCallback) modalCallback(val);
    closeModal();
  }
  document.getElementById('modal-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });
  document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === document.getElementById('modal-bg')) closeModal(); });

  // RENDER
  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    const pending = tareas.filter(t => !t.done);
    const done = tareas.filter(t => t.done);
    const total = tareas.length, doneCount = done.length;
    const pct = total ? Math.round(doneCount/total*100) : 0;
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('prog-label').textContent = doneCount + ' de ' + total + ' tarea' + (total!==1?'s':'');

    if (done.length > 0) {
      app.appendChild(sectionLabel('✓ COMPLETADAS'));
      const w = document.createElement('div'); w.className = 'tasks';
      done.forEach(t => w.appendChild(makeTask(t))); app.appendChild(w);
    }
    if (pending.length > 0) {
      app.appendChild(sectionLabel(done.length > 0 ? '— PENDIENTES' : '— TAREAS DE HOY'));
      const w = document.createElement('div'); w.className = 'tasks';
      pending.forEach(t => w.appendChild(makeTask(t))); app.appendChild(w);
    }
    if (total === 0) {
      const e = document.createElement('div');
      e.style.cssText = 'text-align:center;color:#3a3528;font-size:13px;margin-top:30px;line-height:2.2';
      e.innerHTML = 'No hay tareas todavía.<br>Dictá o escribí las de hoy.';
      app.appendChild(e);
    }

    // PROJECTS
    if (proyectos.length > 0) {
      app.appendChild(sectionLabel('◈ PROYECTOS'));
      const pw = document.createElement('div'); pw.className = 'projects';
      proyectos.forEach(p => pw.appendChild(makeProject(p)));
      app.appendChild(pw);
    }

    // Add project button
    const addProj = document.createElement('button');
    addProj.className = 'add-project-btn';
    addProj.textContent = '+ Nuevo proyecto';
    addProj.onclick = () => openModal('NUEVO PROYECTO', '', nombre => {
      proyectos.push({ id: nextProjId++, nombre, collapsed: false, subtareas: [] });
      save(); render();
    });
    app.appendChild(addProj);

    document.getElementById('all-done').style.display = (total > 0 && doneCount === total) ? 'block' : 'none';
  }

  function sectionLabel(txt) {
    const d = document.createElement('div'); d.className = 'section-label'; d.textContent = txt; return d;
  }

  function makeTask(t) {
    const div = document.createElement('div');
    div.className = 'task' + (t.done ? ' done' : '');
    div.dataset.id = t.id;
    const idx = tareas.findIndex(x => x.id === t.id);
    div.innerHTML = `
      <div class="drag-handle">⠿</div>
      <div class="checkbox"><span class="checkmark">✓</span></div>
      <div class="task-body">
        <div class="task-num">TAREA ${idx+1}</div>
        <div class="task-label">${t.texto}</div>
      </div>
      <div class="task-actions">
        <button class="action-btn action-edit" data-id="${t.id}">✏️</button>
        <button class="action-btn action-delete" data-id="${t.id}">🗑️</button>
      </div>`;

    // checkbox toggle
    div.querySelector('.checkbox').addEventListener('click', e => {
      e.stopPropagation(); hideAllActions();
      t.done = !t.done; save(); render();
    });

    // action buttons
    div.querySelector('.action-edit').addEventListener('click', e => {
      e.stopPropagation();
      openModal('EDITAR TAREA', t.texto, val => { t.texto = val; save(); render(); });
    });
    div.querySelector('.action-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('¿Eliminar esta tarea?')) { tareas = tareas.filter(x => x.id !== t.id); save(); render(); }
    });

    // swipe left → show actions; long press → drag
    div.addEventListener('touchstart', e => onTaskTouchStart(e, div, t), { passive: true });
    div.addEventListener('touchmove', e => onTaskTouchMove(e, div), { passive: false });
    div.addEventListener('touchend', e => onTaskTouchEnd(e, div), { passive: true });

    return div;
  }

  function hideAllActions() {
    document.querySelectorAll('.task.show-actions, .subtask.show-actions').forEach(el => el.classList.remove('show-actions'));
  }

  let swipeStartX = 0, swipeStartY = 0, swipeEl = null, swiping = false;

  function onTaskTouchStart(e, div, t) {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeEl = div;
    swiping = false;
    isDragging = false;
    actionMoved = false;
    startY = e.touches[0].clientY;

    // Long press → drag (only if not swiping)
    longPressTimer = setTimeout(() => {
      if (!swiping) startDrag(div, e.touches[0]);
    }, 400);
  }

  function onTaskTouchMove(e, div) {
    const touch = e.touches[0];
    const dx = swipeStartX - touch.clientX; // positive = swipe left
    const dy = Math.abs(touch.clientY - swipeStartY);

    if (isDragging) {
      e.preventDefault();
      if (ghost) ghost.style.top = (touch.clientY - ghostOffsetY) + 'px';
      ghost.style.display = 'none';
      const under = document.elementFromPoint(touch.clientX, touch.clientY);
      ghost.style.display = '';
      const tgt = under ? under.closest('.task') : null;
      document.querySelectorAll('.task.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (tgt && tgt.dataset.id !== String(dragId)) tgt.classList.add('drag-over');
      return;
    }

    // Detect horizontal swipe left (dx > 15, horizontal > vertical)
    if (!swiping && dx > 15 && dx > dy) {
      swiping = true;
      clearTimeout(longPressTimer);
      hideAllActions();
      div.classList.add('show-actions');
      if (navigator.vibrate) navigator.vibrate(20);
      return;
    }

    // Vertical scroll → cancel long press
    if (dy > 10) clearTimeout(longPressTimer);
  }

  function onTaskTouchEnd(e, div) {
    clearTimeout(longPressTimer);
    if (isDragging) {
      const touch = e.changedTouches[0];
      ghost.style.display = 'none';
      const under = document.elementFromPoint(touch.clientX, touch.clientY);
      ghost.style.display = '';
      const tgt = under ? under.closest('.task') : null;
      if (tgt && tgt.dataset.id !== String(dragId)) {
        const fi = tareas.findIndex(t => t.id === dragId);
        const ti = tareas.findIndex(t => t.id === Number(tgt.dataset.id));
        if (fi !== -1 && ti !== -1) { const [m] = tareas.splice(fi,1); tareas.splice(ti,0,m); save(); }
      }
      if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
      ghost=null; dragId=null; isDragging=false;
      document.querySelectorAll('.task.dragging,.task.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));
      render();
    } else if (!swiping) {
      // short tap anywhere → hide open actions
      hideAllActions();
    }
    swiping = false;
  }

  function startDrag(el, touch) {
    isDragging = true; dragId = Number(el.dataset.id);
    const rect = el.getBoundingClientRect();
    ghostOffsetY = touch.clientY - rect.top;
    ghost = el.cloneNode(true);
    ghost.classList.add('ghost');
    ghost.style.width = rect.width + 'px'; ghost.style.left = rect.left + 'px';
    ghost.style.top = (touch.clientY - ghostOffsetY) + 'px';
    document.body.appendChild(ghost);
    el.classList.add('dragging');
    if (navigator.vibrate) navigator.vibrate(30);
  }

  // PROJECTS
  let projDragId=null, projGhost=null, projGhostOffsetY=0, projLongTimer=null, projIsDragging=false, projSwipeStartX=0, projSwipeStartY=0, projSwiping=false;

  function makeProject(p) {
    const card = document.createElement('div');
    card.className = 'project-card' + (p.collapsed ? ' collapsed' : '');
    card.dataset.pid = p.id;

    const doneCount = p.subtareas.filter(s => s.done).length;
    const total = p.subtareas.length;

    card.innerHTML = `
      <div class="project-header" style="position:relative;overflow:hidden">
        <div class="project-dot"></div>
        <div class="project-name">${p.nombre}</div>
        <div class="project-count">${doneCount}/${total}</div>
        <div class="project-toggle">▾</div>
        <div class="proj-actions">
          <button class="action-btn action-edit" style="font-size:16px">✏️</button>
          <button class="action-btn action-delete" style="font-size:16px">🗑️</button>
        </div>
      </div>
      <div class="project-body">
        <div class="subtasks-wrap"></div>
        <div class="project-add">
          <input type="text" placeholder="Agregar acción..." />
          <button>+</button>
        </div>
      </div>`;

    // toggle collapse on tap (only if not swiped)
    card.querySelector('.project-header').addEventListener('click', (e) => {
      if (card.classList.contains('show-proj-actions')) { hideAllProjActions(); return; }
      if (e.target.closest('.proj-actions')) return;
      p.collapsed = !p.collapsed; save(); render();
    });

    // edit/delete buttons
    card.querySelector('.action-edit').addEventListener('click', e => {
      e.stopPropagation(); hideAllProjActions();
      openModal('EDITAR PROYECTO', p.nombre, val => { p.nombre = val; save(); render(); });
    });
    card.querySelector('.action-delete').addEventListener('click', e => {
      e.stopPropagation(); hideAllProjActions();
      if (confirm('¿Eliminar "' + p.nombre + '" y todas sus acciones?')) {
        proyectos = proyectos.filter(x => x.id !== p.id); save(); render();
      }
    });

    // swipe left → actions, long press → drag
    const header = card.querySelector('.project-header');
    header.addEventListener('touchstart', e => onProjTouchStart(e, card), { passive: true });
    header.addEventListener('touchmove', e => onProjTouchMove(e, card), { passive: false });
    header.addEventListener('touchend', e => onProjTouchEnd(e, card), { passive: true });

    // subtasks
    const wrap = card.querySelector('.subtasks-wrap');
    p.subtareas.forEach(s => wrap.appendChild(makeSubtask(p, s)));

    // add subtask
    const addInput = card.querySelector('.project-add input');
    const addBtn = card.querySelector('.project-add button');
    const addSub = () => {
      const val = addInput.value.trim(); if (!val) return;
      const newId = p.subtareas.length > 0 ? Math.max(...p.subtareas.map(s=>s.id))+1 : 0;
      p.subtareas.push({ id: newId, texto: val, done: false });
      addInput.value = ''; save(); render();
    };
    addBtn.addEventListener('click', e => { e.stopPropagation(); addSub(); });
    addInput.addEventListener('keydown', e => { if (e.key==='Enter') addSub(); });
    addInput.addEventListener('click', e => e.stopPropagation());

    return card;
  }

  function hideAllProjActions() {
    document.querySelectorAll('.project-card.show-proj-actions').forEach(el => el.classList.remove('show-proj-actions'));
  }

  function onProjTouchStart(e, card) {
    projSwipeStartX = e.touches[0].clientX;
    projSwipeStartY = e.touches[0].clientY;
    projSwiping = false; projIsDragging = false;
    projLongTimer = setTimeout(() => {
      if (!projSwiping) startProjDrag(card, e.touches[0]);
    }, 400);
  }

  function onProjTouchMove(e, card) {
    const touch = e.touches[0];
    const dx = projSwipeStartX - touch.clientX;
    const dy = Math.abs(touch.clientY - projSwipeStartY);

    if (projIsDragging) {
      e.preventDefault();
      if (projGhost) projGhost.style.top = (touch.clientY - projGhostOffsetY) + 'px';
      projGhost.style.display = 'none';
      const under = document.elementFromPoint(touch.clientX, touch.clientY);
      projGhost.style.display = '';
      const tgt = under ? under.closest('.project-card') : null;
      document.querySelectorAll('.project-card.drag-over-proj').forEach(el => el.classList.remove('drag-over-proj'));
      if (tgt && tgt.dataset.pid !== String(projDragId)) tgt.classList.add('drag-over-proj');
      return;
    }

    if (!projSwiping && dx > 15 && dx > dy) {
      projSwiping = true;
      clearTimeout(projLongTimer);
      hideAllProjActions();
      card.classList.add('show-proj-actions');
      if (navigator.vibrate) navigator.vibrate(20);
      return;
    }
    if (dy > 10) clearTimeout(projLongTimer);
  }

  function onProjTouchEnd(e, card) {
    clearTimeout(projLongTimer);
    if (projIsDragging) {
      const touch = e.changedTouches[0];
      projGhost.style.display = 'none';
      const under = document.elementFromPoint(touch.clientX, touch.clientY);
      projGhost.style.display = '';
      const tgt = under ? under.closest('.project-card') : null;
      if (tgt && tgt.dataset.pid !== String(projDragId)) {
        const fi = proyectos.findIndex(p => p.id === projDragId);
        const ti = proyectos.findIndex(p => p.id === Number(tgt.dataset.pid));
        if (fi !== -1 && ti !== -1) { const [m] = proyectos.splice(fi,1); proyectos.splice(ti,0,m); save(); }
      }
      if (projGhost && projGhost.parentNode) projGhost.parentNode.removeChild(projGhost);
      projGhost=null; projDragId=null; projIsDragging=false;
      document.querySelectorAll('.project-card.dragging-proj,.project-card.drag-over-proj').forEach(el=>el.classList.remove('dragging-proj','drag-over-proj'));
      render();
    }
    projSwiping = false;
  }

  function startProjDrag(card, touch) {
    projIsDragging = true; projDragId = Number(card.dataset.pid);
    const rect = card.getBoundingClientRect();
    projGhostOffsetY = touch.clientY - rect.top;
    projGhost = card.cloneNode(true);
    projGhost.classList.add('ghost-proj');
    projGhost.style.width = rect.width + 'px'; projGhost.style.left = rect.left + 'px';
    projGhost.style.top = (touch.clientY - projGhostOffsetY) + 'px';
    projGhost.style.background = '#0e1f08';
    document.body.appendChild(projGhost);
    card.classList.add('dragging-proj');
    if (navigator.vibrate) navigator.vibrate(30);
  }

  function makeSubtask(p, s) {
    const div = document.createElement('div');
    div.className = 'subtask' + (s.done ? ' done' : '');
    div.innerHTML = `
      <div class="sub-checkbox"><span class="sub-check">✓</span></div>
      <div class="subtask-label">${s.texto}</div>
      <div class="subtask-actions">
        <button class="action-btn action-edit" style="font-size:15px">✏️</button>
        <button class="action-btn action-delete" style="font-size:15px">🗑️</button>
      </div>`;

    div.querySelector('.sub-checkbox').addEventListener('click', e => {
      e.stopPropagation(); hideAllActions();
      s.done = !s.done; save(); render();
    });
    div.querySelector('.action-edit').addEventListener('click', e => {
      e.stopPropagation();
      openModal('EDITAR ACCIÓN', s.texto, val => { s.texto = val; save(); render(); });
    });
    div.querySelector('.action-delete').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('¿Eliminar esta acción?')) { p.subtareas = p.subtareas.filter(x => x.id !== s.id); save(); render(); }
    });

    // long press to show actions
    let stTimer;
    div.addEventListener('touchstart', () => {
      stTimer = setTimeout(() => {
        hideAllActions(); div.classList.add('show-actions');
        if (navigator.vibrate) navigator.vibrate(40);
      }, 500);
    }, { passive: true });
    div.addEventListener('touchmove', () => clearTimeout(stTimer), { passive: true });
    div.addEventListener('touchend', () => clearTimeout(stTimer));

    return div;
  }

  // ADD TASK
  function agregarTarea() {
    const input = document.getElementById('nueva');
    const val = input.value.trim(); if (!val) return;
    tareas.push({ id: nextId++, texto: val, done: false });
    input.value = ''; save(); render();
  }
  document.getElementById('nueva').addEventListener('keydown', e => { if (e.key==='Enter') agregarTarea(); });

  // RESET
  function resetearDia() {
    if (!confirm('¿Limpiar tareas del día y empezar de cero?\n(Los proyectos se mantienen)')) return;
    tareas = []; nextId = 0; save(); render();
  }

  // VOICE
  let recognition=null, isRecording=false, transcriptAcum='';
  function setStatus(msg,err) { const el=document.getElementById('voice-status'); el.textContent=msg; el.className='voice-status'+(err?' error':''); }
  function setBtn(state) {
    const btn=document.getElementById('voice-btn'), lbl=document.getElementById('voice-lbl');
    if(state==='idle'){btn.className='voice-btn';lbl.textContent='DICTAR TAREAS DEL DÍA';}
    else if(state==='rec'){btn.className='voice-btn recording';lbl.textContent='GRABANDO... TOCÁ PARA DETENER';}
    else if(state==='load'){btn.className='voice-btn loading';lbl.textContent='PROCESANDO...';}
  }
  function toggleVoice() { if(isRecording){isRecording=false;if(recognition)recognition.stop();}else startRecording(); }
  function getApiKey() { try{return localStorage.getItem('anthropic_key')||'';}catch(e){return '';} }
  function pedirApiKey() {
    const k=prompt('Ingresá tu API key de Anthropic:');
    if(k&&k.trim().startsWith('sk-ant-')){try{localStorage.setItem('anthropic_key',k.trim());}catch(e){}setStatus('✓ API key guardada. Dictá tus tareas.',false);}
    else if(k){setStatus('Key inválida. Debe empezar con sk-ant-',true);}
  }
  function startRecording() {
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setStatus('Usá Chrome o Safari.',true);return;}
    transcriptAcum='';
    recognition=new SR(); recognition.lang='es-AR'; recognition.continuous=true; recognition.interimResults=true;
    recognition.onstart=()=>{isRecording=true;setBtn('rec');setStatus('Escuchando...');};
    recognition.onresult=(e)=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal)transcriptAcum+=t+' '; else interim=t;
      }
      setStatus('...'+(transcriptAcum+interim).trim().slice(-50));
    };
    recognition.onerror=(e)=>{isRecording=false;setBtn('idle');setStatus('Error: '+e.error,true);};
    recognition.onend=()=>{if(!isRecording)procesarTranscript();else{isRecording=false;procesarTranscript();}};
    recognition.start();
  }
  async function procesarTranscript() {
    const texto=transcriptAcum.trim();
    if(!texto){setBtn('idle');setStatus('No se detectó audio.',true);return;}
    const apiKey=getApiKey();
    if(!apiKey){pedirApiKey();setBtn('idle');return;}
    setBtn('load');setStatus('Extrayendo tareas con IA...');
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',max_tokens:1000,
          system:'Extraés tareas de texto dictado en español rioplatense. Puede tener repeticiones o errores. Identificá las tareas reales, eliminar repeticiones, devolvé cada tarea limpia. Responde SOLO con JSON: {"tareas":["tarea 1","tarea 2",...]}',
          messages:[{role:'user',content:'Texto dictado: "'+texto+'"'}]
        })
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const raw=(data.content.find(b=>b.type==='text')||{}).text||'{}';
      let parsed; try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){throw new Error('JSON inválido');}
      const nuevas=parsed.tareas||[];
      if(nuevas.length===0){setStatus('No encontré tareas.',true);setBtn('idle');return;}
      const preview=nuevas.map((t,i)=>(i+1)+'. '+t).join('\n');
      const reemplazar=confirm('Se detectaron '+nuevas.length+' tarea(s):\n\n'+preview+'\n\n¿Reemplazar la lista actual?');
      if(reemplazar){tareas=nuevas.map(t=>({id:nextId++,texto:t,done:false}));}
      else{nuevas.forEach(t=>tareas.push({id:nextId++,texto:t,done:false}));}
      save();render();setBtn('idle');setStatus('✓ '+nuevas.length+' tarea'+(nuevas.length>1?'s':'')+' cargada'+(nuevas.length>1?'s':''));
    }catch(err){setBtn('idle');setStatus('Error: '+err.message,true);}
  }

  if(!getApiKey()) setTimeout(()=>setStatus('Tocá el micrófono para configurar tu API key.',false),600);

  render();
</script>
</body>
