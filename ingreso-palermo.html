<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orden de Ingreso · Teque Onda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --gold: #FFC72C; --gold-dim: #c99a1a; --dark: #111009; --surface: #1a1810;
  --card: #221f12; --border: #332e18; --red: #e8412a; --green: #3dba6e;
  --text: #f0e8cc; --muted: #8a8060;
  --fh: 'Bebas Neue', sans-serif; --fb: 'Fira Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: var(--fb); min-height: 100vh; }

/* ── TABS ── */
.tabs { display: flex; background: var(--surface); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
.tab { flex: 1; padding: 14px 8px; font-family: var(--fh); font-size: 0.9rem; letter-spacing: 1.5px; color: var(--muted); text-align: center; cursor: pointer; border: none; background: transparent; transition: all 0.15s; }
.tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
.tab:hover { color: var(--text); }
.page { display: none; padding-bottom: 40px; }
.page.active { display: block; }

/* ── HEADER ── */
.page-header { padding: 20px 16px 12px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); }
.page-title { font-family: var(--fh); font-size: 1.6rem; letter-spacing: 2px; color: var(--gold); line-height: 1; }
.page-sub { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

/* ── FORM META ── */
.meta-row { display: flex; gap: 10px; padding: 14px 16px 0; flex-wrap: wrap; }
.meta-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
.meta-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }
.meta-input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--fb); font-size: 0.85rem; padding: 8px 10px; border-radius: 8px; outline: none; }
.meta-input:focus { border-color: var(--gold); }
.meta-select { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--fb); font-size: 0.85rem; padding: 8px 10px; border-radius: 8px; outline: none; width: 100%; }

/* ── CATEGORIES ── */
.section-wrap { margin: 14px 16px 0; }
.cat-block { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; background: var(--card); }
.cat-toggle { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; background: var(--surface); user-select: none; }
.cat-toggle:hover { background: rgba(255,199,44,0.04); }
.cat-icon { font-size: 1rem; }
.cat-name { font-family: var(--fh); font-size: 1rem; letter-spacing: 2px; color: var(--gold); flex: 1; }
.cat-summary { font-size: 0.68rem; color: var(--muted); font-weight: 500; }
.cat-chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
.cat-block.open .cat-chevron { transform: rotate(180deg); }
.cat-body { display: none; }
.cat-block.open .cat-body { display: block; }

/* ── PRODUCT ROWS ── */
.prod-row { display: flex; align-items: center; padding: 9px 14px; border-top: 1px solid var(--border); gap: 8px; }
.prod-name { font-size: 0.8rem; font-weight: 500; flex: 1; }
.prod-abbr { font-size: 0.6rem; color: var(--muted); margin-left: 3px; }
.price-input { background: var(--dark); border: 1px solid var(--border); color: var(--text); font-family: var(--fb); font-size: 0.8rem; font-weight: 600; width: 72px; text-align: center; padding: 5px 4px; border-radius: 6px; outline: none; }
.price-input:focus { border-color: var(--gold); }
.price-input::-webkit-inner-spin-button { display: none; }
.qty-wrap { display: flex; align-items: center; background: var(--dark); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.qty-btn { background: transparent; border: none; color: var(--muted); font-size: 1rem; width: 26px; height: 30px; cursor: pointer; font-weight: 700; }
.qty-btn:hover { color: var(--gold); }
.qty-num { background: transparent; border: none; color: var(--text); font-family: var(--fb); font-size: 0.85rem; font-weight: 700; width: 42px; text-align: center; height: 30px; outline: none; }
.qty-num::-webkit-inner-spin-button { display: none; }
.col-label { font-size: 0.58rem; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
.col-headers { display: flex; align-items: center; padding: 5px 14px; border-top: 1px solid var(--border); gap: 8px; background: rgba(0,0,0,0.2); }
.col-headers .prod-name { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── TOTALS BAR ── */
.totals-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 2px solid var(--gold); padding: 12px 16px; display: flex; align-items: center; gap: 10px; z-index: 50; }
.totals-info { flex: 1; display: flex; gap: 16px; flex-wrap: wrap; }
.total-pill { font-size: 0.72rem; }
.total-pill b { color: var(--gold); }
.btn-preview { background: var(--gold); color: var(--dark); border: none; font-family: var(--fh); font-size: 1rem; letter-spacing: 1.5px; padding: 10px 18px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
.btn-preview:hover { background: #e6b220; }

/* ── PREVIEW / TICKET ── */
#previewPage { background: var(--dark); }
.preview-actions { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
.btn-action { flex: 1; padding: 11px; border-radius: 8px; border: none; font-family: var(--fh); font-size: 0.95rem; letter-spacing: 1px; cursor: pointer; min-width: 100px; }
.btn-back   { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-png    { background: var(--card); color: var(--gold); border: 1px solid var(--gold); }
.btn-print  { background: var(--gold); color: var(--dark); }

/* ── TICKET CARD ── */
.ticket-wrap { padding: 0 16px 20px; }
.ticket {
  background: #fff; color: #111; border-radius: 4px; overflow: hidden;
  font-family: 'Courier New', monospace; font-size: 12px; max-width: 400px; margin: 0 auto;
  border: 1px solid #ccc;
}
.ticket-header { background: #fff; color: #111; padding: 12px 16px 8px; text-align: center; border-bottom: 2px solid #111; }
.ticket-brand { font-family: var(--fh); font-size: 1.8rem; letter-spacing: 4px; color: #111; }
.ticket-sub { font-size: 0.65rem; letter-spacing: 2px; color: #555; margin-top: 2px; }
.ticket-from-to { display: flex; justify-content: space-between; padding: 8px 14px 6px; font-size: 11px; background: #fff; border-bottom: 1px dashed #aaa; }
.ticket-from-to .arrow { color: #555; font-size: 13px; }
.ticket-meta { padding: 6px 14px; border-bottom: 1px dashed #aaa; display: flex; justify-content: space-between; font-size: 11px; color: #444; }
.ticket-cat-header { background: #fff; color: #111; padding: 5px 14px 3px; font-size: 10px; letter-spacing: 2px; font-family: var(--fh); border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
.ticket-line { display: flex; padding: 4px 14px; border-bottom: 1px dotted #ddd; gap: 4px; }
.ticket-line .tl-name { flex: 1; font-size: 11px; }
.ticket-line .tl-qty  { width: 36px; text-align: right; font-size: 11px; }
.ticket-line .tl-price{ width: 56px; text-align: right; font-size: 11px; color: #555; }
.ticket-line .tl-sub  { width: 62px; text-align: right; font-size: 11px; font-weight: 700; }
.ticket-col-header { display: flex; padding: 3px 14px; background: #f5f5f5; gap: 4px; border-bottom: 1px solid #ddd; }
.ticket-col-header span { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.ticket-col-header .tl-name { flex:1; }
.ticket-totals { padding: 8px 14px; border-top: 1px solid #111; }
.ticket-total-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
.ticket-total-row.grand { font-size: 14px; font-weight: 700; border-top: 1px dashed #aaa; padding-top: 6px; margin-top: 4px; }
.ticket-confirm { display: flex; border-top: 1px dashed #aaa; }
.ticket-confirm-box { flex: 1; padding: 10px 14px; text-align: center; }
.ticket-confirm-box:first-child { border-right: 1px dashed #aaa; }
.ticket-confirm-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 20px; }
.ticket-confirm-name { font-size: 10px; font-weight: 700; border-top: 1px solid #555; padding-top: 4px; margin-top: 20px; }
.ticket-footer { background: #fff; color: #888; text-align: center; padding: 6px; font-size: 9px; letter-spacing: 1px; border-top: 1px dashed #aaa; }
.ticket-orden-num { font-size: 10px; color: #666; text-align: center; padding: 4px 0; }
.copy-label { border: 1px dashed #aaa; color: #444; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 2px; padding: 3px; margin-bottom: 4px; }

/* ── HISTORY ── */
.hist-empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 20px; }
.hist-card { margin: 12px 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.hist-card-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.hist-orden { font-family: var(--fh); font-size: 1rem; letter-spacing: 1px; color: var(--gold); }
.hist-date { font-size: 0.7rem; color: var(--muted); }
.hist-total { margin-left: auto; font-size: 0.85rem; font-weight: 700; color: var(--text); }
.hist-status { font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
.hist-status.pendiente { background: rgba(240,125,26,0.15); color: #f07d1a; border: 1px solid rgba(240,125,26,0.3); }
.hist-status.confirmada { background: rgba(61,186,110,0.12); color: var(--green); border: 1px solid rgba(61,186,110,0.2); }
.hist-actions { display: flex; gap: 8px; padding: 0 14px 12px; }
.hist-btn { flex: 1; padding: 7px; border-radius: 7px; font-family: var(--fh); font-size: 0.8rem; letter-spacing: 1px; border: none; cursor: pointer; text-align: center; }
.hist-btn.view   { background: var(--surface); color: var(--gold); border: 1px solid var(--border); }
.hist-btn.confirm{ background: rgba(61,186,110,0.15); color: var(--green); border: 1px solid rgba(61,186,110,0.3); }
.hist-btn.del    { background: rgba(232,65,42,0.1); color: var(--red); border: 1px solid rgba(232,65,42,0.2); max-width: 44px; }
.hist-items-preview { padding: 0 14px 10px; font-size: 0.72rem; color: var(--muted); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 8px; }

@media print {
  body * { visibility: hidden; }
  .ticket, .ticket * { visibility: visible; }
  .ticket { position: fixed; top: 0; left: 0; width: 100%; border-radius: 0; }
  .ticket-wrap { padding: 0; }
  .copy-label { display: block !important; }
}

/* ── REPORT STYLES ── */
/* ── PIE CHART ── */
.pie-section { margin-top:14px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
.pie-toggle-row { display:flex; gap:8px; margin-bottom:14px; }
.pie-toggle { background:var(--dark); border:1px solid var(--border); color:var(--muted); font-family:var(--fb); font-size:0.72rem; font-weight:600; padding:6px 14px; border-radius:20px; cursor:pointer; transition:all 0.15s; }
.pie-toggle.active { background:var(--gold); border-color:var(--gold); color:var(--dark); }
.pie-container { display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center; }
.pie-legend { display:flex; flex-direction:column; gap:6px; flex:1; min-width:140px; }
.pie-legend-item { display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:background 0.1s; }
.pie-legend-item:hover { background:rgba(255,199,44,0.07); }
.pie-legend-item.hl { background:rgba(255,199,44,0.13); }
.pie-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.pie-legend-label { font-size:0.72rem; color:var(--text); flex:1; }
.pie-legend-pct { font-size:0.75rem; font-weight:700; color:var(--gold); min-width:36px; text-align:right; }
.pie-legend-val { font-size:0.65rem; color:var(--muted); min-width:72px; text-align:right; }
.pie-tooltip { display:none; background:var(--surface); border:1px solid var(--gold); border-radius:8px; padding:10px 14px; margin-top:12px; }
.pie-tooltip.visible { display:block; }
.pie-tooltip-cat { font-family:var(--fh); font-size:1rem; letter-spacing:1px; color:var(--gold); margin-bottom:6px; }
.pie-tooltip-row { display:flex; justify-content:space-between; gap:16px; font-size:0.78rem; margin-bottom:3px; }
.pie-tooltip-row span:last-child { font-weight:700; color:var(--text); }
.rep-summary { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.rep-kpi { flex:1; min-width:100px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.rep-kpi-val { font-family:var(--fh); font-size:1.5rem; letter-spacing:1px; color:var(--gold); }
.rep-kpi-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.rep-cat { margin-top:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.rep-cat-header { background:var(--surface); padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.rep-cat-name { font-family:var(--fh); font-size:1rem; letter-spacing:2px; color:var(--gold); flex:1; }
.rep-cat-totals { font-size:0.72rem; color:var(--muted); text-align:right; line-height:1.5; }
.rep-cat-body { display:none; }
.rep-cat.open .rep-cat-body { display:block; }
.rep-prod-row { display:flex; align-items:center; padding:8px 14px; border-top:1px solid var(--border); gap:8px; }
.rep-prod-name { flex:1; font-size:0.8rem; font-weight:500; }
.rep-prod-abbr { font-size:0.6rem; color:var(--muted); margin-left:3px; }
.rep-prod-qty { width:60px; text-align:right; font-size:0.78rem; color:var(--muted); }
.rep-prod-monto { width:80px; text-align:right; font-size:0.78rem; font-weight:700; color:var(--gold); }
.rep-bar-wrap { flex:1; height:4px; background:var(--border); border-radius:2px; margin:0 8px; }
.rep-bar { height:4px; background:var(--gold); border-radius:2px; transition:width 0.4s; }
.rep-empty { text-align:center; color:var(--muted); font-size:0.85rem; padding:40px 20px; }
.rep-col-header { display:flex; padding:4px 14px; background:rgba(0,0,0,0.2); gap:8px; }
.rep-col-header span { font-size:0.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showPage('nueva')">📦 NUEVA</button>
  <button class="tab" onclick="showPage('preview')" id="tabPreview" style="display:none">🧾 ORDEN</button>
  <button class="tab" onclick="showPage('historial')">📋 HISTORIAL</button>
  <button class="tab" onclick="showPage('reportes')">📊 REPORTES</button>
</div>

<!-- ══ NUEVA ORDEN ══════════════════════════════════════════════════════ -->
<div id="nueva" class="page active">
  <div class="page-header">
    <div>
      <div class="page-title">ORDEN DE INGRESO</div>
      <div class="page-sub">Fábrica → Palermo Bonpland 1708</div>
    </div>
  </div>

  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-label">N° Orden</div>
      <input class="meta-input" id="numOrden" type="text" placeholder="OI-001" readonly>
    </div>
    <div class="meta-field">
      <div class="meta-label">Fecha</div>
      <input class="meta-input" id="fechaOrden" type="date">
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-label">Entrega (fábrica)</div>
      <input class="meta-input" id="entregaInput" type="text" placeholder="Nombre quien entrega">
    </div>
    <div class="meta-field">
      <div class="meta-label">Recibe (sucursal)</div>
      <input class="meta-input" id="recibeInput" type="text" placeholder="Nombre quien recibe">
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field" style="flex:2">
      <div class="meta-label">Observaciones</div>
      <input class="meta-input" id="obsInput" type="text" placeholder="Opcional">
    </div>
  </div>

  <div class="section-wrap" id="catList"></div>

  <div class="totals-bar">
    <div class="totals-info">
      <div class="total-pill">Items: <b id="totalItems">0</b></div>
      <div class="total-pill">Líneas: <b id="totalLineas">0</b></div>
      <div class="total-pill">Total: <b id="totalMonto">$0</b></div>
    </div>
    <button class="btn-preview" onclick="generarOrden()">🧾 GENERAR</button>
  </div>
</div>

<!-- ══ PREVIEW ══════════════════════════════════════════════════════════ -->
<div id="preview" class="page">
  <div class="preview-actions">
    <button class="btn-action btn-back"  onclick="volverEditar()">← VOLVER</button>
    <button class="btn-action btn-png"   onclick="descargarPNG()">📸 PNG</button>
    <button class="btn-action btn-print" onclick="imprimir()">🖨️ IMPRIMIR</button>
  </div>
  <div class="ticket-wrap" id="ticketWrap"></div>
</div>

<!-- ══ HISTORIAL ════════════════════════════════════════════════════════ -->
<div id="historial" class="page">
  <div class="page-header">
    <div>
      <div class="page-title">HISTORIAL</div>
      <div class="page-sub">Órdenes de ingreso emitidas</div>
    </div>
  </div>
  <div id="histList"></div>
</div>


<!-- ══ REPORTES ════════════════════════════════════════════════════════ -->
<div id="reportes" class="page">
  <div class="page-header">
    <div>
      <div class="page-title">REPORTES</div>
      <div class="page-sub">Acumulado de ingresos por período</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;padding:14px 16px 0;flex-wrap:wrap;align-items:flex-end">
    <div class="meta-field" style="min-width:110px">
      <div class="meta-label">Período</div>
      <select class="meta-select" id="repPeriodo" onchange="renderReporte()">
        <option value="week">Esta semana</option>
        <option value="lastweek">Semana anterior</option>
        <option value="month" selected>Este mes</option>
        <option value="lastmonth">Mes anterior</option>
        <option value="all">Todo</option>
        <option value="custom">Rango personalizado</option>
      </select>
    </div>
    <div class="meta-field" id="customRange" style="display:none;flex-direction:row;gap:8px;align-items:flex-end">
      <div>
        <div class="meta-label">Desde</div>
        <input class="meta-input" type="date" id="repDesde" onchange="renderReporte()">
      </div>
      <div>
        <div class="meta-label">Hasta</div>
        <input class="meta-input" type="date" id="repHasta" onchange="renderReporte()">
      </div>
    </div>
  </div>
  <div id="repContent" style="padding:0 16px 20px"></div>
</div>
<script>
// ── PIE CHART ENGINE ─────────────────────────────────────────────────────
let _pieCache=[], _pieMetric='monto', _pieActive=-1;
const PIE_COLORS=['#111111','#444444','#777777','#aaaaaa','#333333','#666666','#999999','#cccccc','#222222','#888888'];

function switchPie(m){
  _pieMetric=m; _pieActive=-1;
  document.querySelectorAll('.pie-toggle').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(m==='monto'?'ptMonto':'ptQty');
  if(btn)btn.classList.add('active');
  drawPie(_pieCache,m);
}

function drawPie(data,metric){
  _pieCache=data; _pieMetric=metric;
  const canvas=document.getElementById('pieChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const totalVal=data.reduce((a,d)=>a+(d[metric]||0),0);
  if(!totalVal){ctx.clearRect(0,0,200,200);return;}
  const cx=100,cy=100,r=85,ir=40;
  ctx.clearRect(0,0,200,200);
  let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=(d[metric]||0)/totalVal;
    const sw=pct*2*Math.PI;
    const s={...d,pct,sw,ang0:ang,color:PIE_COLORS[i%PIE_COLORS.length],i};
    ang+=sw; return s;
  });
  slices.forEach(s=>{
    const expand=s.i===_pieActive;
    const ex=expand?Math.cos(s.ang0+s.sw/2)*6:0;
    const ey=expand?Math.sin(s.ang0+s.sw/2)*6:0;
    ctx.save(); ctx.translate(ex,ey);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,expand?r+5:r,s.ang0,s.ang0+s.sw);
    ctx.closePath(); ctx.fillStyle=s.color; ctx.fill();
    ctx.strokeStyle='#1a1810'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  });
  // hole
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,2*Math.PI);
  ctx.fillStyle='#221f12'; ctx.fill();
  // center label
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(_pieActive>=0&&slices[_pieActive]){
    const s=slices[_pieActive];
    ctx.fillStyle='#FFC72C'; ctx.font='bold 20px Fira Sans,sans-serif';
    ctx.fillText(Math.round(s.pct*100)+'%',cx,cy);
  } else {
    ctx.fillStyle='#8a8060'; ctx.font='10px Fira Sans,sans-serif';
    ctx.fillText('TOTAL',cx,cy-9);
    ctx.fillStyle='#f0e8cc'; ctx.font='bold 12px Fira Sans,sans-serif';
    ctx.fillText(metric==='monto'?fmt(totalVal):totalVal.toLocaleString('es-AR')+' und',cx,cy+9);
  }
  // legend
  const leg=document.getElementById('pieLegend');
  if(leg) leg.innerHTML=slices.map(s=>`
    <div class="pie-legend-item${s.i===_pieActive?' hl':''}"
      onclick="selectSlice(${s.i})" onmouseenter="hoverSlice(${s.i})" onmouseleave="hoverSlice(-1)">
      <div class="pie-legend-dot" style="background:${s.color}"></div>
      <div class="pie-legend-label">${catIcons[s.cat]||''} ${s.cat}</div>
      <div class="pie-legend-pct">${Math.round(s.pct*100)}%</div>
      <div class="pie-legend-val">${metric==='monto'?fmt(s.monto):s.qty.toLocaleString('es-AR')+' und'}</div>
    </div>`).join('');
  // canvas click
  canvas.onclick=function(e){
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const x=(e.clientX-rect.left)*sx-cx, y=(e.clientY-rect.top)*sy-cy;
    const dist=Math.sqrt(x*x+y*y);
    if(dist<ir||dist>r+12){selectSlice(-1);return;}
    let a=Math.atan2(y,x); if(a<-Math.PI/2)a+=2*Math.PI; else a-=(-Math.PI/2-0);
    // recalc angle from -pi/2
    let raw=Math.atan2(y,x)+Math.PI/2; if(raw<0)raw+=2*Math.PI;
    const hit=slices.find(s=>{
      let a0=s.ang0+Math.PI/2; if(a0<0)a0+=2*Math.PI;
      let a1=a0+s.sw;
      return raw>=a0&&raw<=a1;
    });
    selectSlice(hit?(hit.i===_pieActive?-1:hit.i):-1);
  };
}

function hoverSlice(i){ if(_pieActive>=0)return; _pieActive=i; drawPie(_pieCache,_pieMetric); showTooltip(i); }
function selectSlice(i){ _pieActive=i; drawPie(_pieCache,_pieMetric); showTooltip(i); }

function showTooltip(i){
  const tip=document.getElementById('pieTooltip'); if(!tip)return;
  if(i<0||!_pieCache[i]){tip.classList.remove('visible');return;}
  const d=_pieCache[i];
  const totM=_pieCache.reduce((a,x)=>a+x.monto,0)||1;
  const totQ=_pieCache.reduce((a,x)=>a+x.qty,0)||1;
  const pM=Math.round(d.monto/totM*100), pQ=Math.round(d.qty/totQ*100);
  tip.classList.add('visible');
  tip.innerHTML=`<div class="pie-tooltip-cat">${catIcons[d.cat]||''} ${d.cat}</div>
    <div class="pie-tooltip-row"><span>💰 Monto</span><span>${fmt(d.monto)} · ${pM}% del total</span></div>
    <div class="pie-tooltip-row"><span>📦 Unidades</span><span>${d.qty.toLocaleString('es-AR')} und · ${pQ}% del total</span></div>`;
}

function toggleCat(el){ el.parentElement.classList.toggle('open'); }

function onQtyChange(id,v){
  qtys[id]=Math.max(0,parseInt(v)||0);
  updateSub(id); recalcTotals();
}
function onPriceChange(id,v){
  prices[id]=parseFloat(v)||0;
  savePrice(id,prices[id]);
  updateSub(id); recalcTotals();
}
function adj(id,d){
  qtys[id]=Math.max(0,(qtys[id]||0)+d);
  const inp=document.getElementById('qty-'+id);
  if(inp)inp.value=qtys[id];
  updateSub(id); recalcTotals();
}
function updateSub(id){
  const el=document.getElementById('sub-'+id);
  if(!el)return;
  const s=qtys[id]*prices[id];
  el.textContent = qtys[id]>0&&prices[id]>0 ? fmt(s) : qtys[id]>0 ? qtys[id]+' und' : '—';
}
function recalcTotals(){
  let items=0,lineas=0,monto=0;
  catalog.forEach(p=>{
    if(qtys[p.id]>0){ items+=qtys[p.id]; lineas++; monto+=qtys[p.id]*prices[p.id]; }
  });
  document.getElementById('totalItems').textContent=items;
  document.getElementById('totalLineas').textContent=lineas;
  document.getElementById('totalMonto').textContent=fmt(monto);
  // update cat summaries
  const cats=[...new Set(catalog.map(p=>p.cat))];
  cats.forEach(cat=>{
    const el=document.getElementById('sum-'+cat.replace(/\s/g,'_'));
    if(!el)return;
    const prods=catalog.filter(p=>p.cat===cat);
    const catItems=prods.reduce((a,p)=>a+(qtys[p.id]||0),0);
    el.textContent = catItems>0 ? catItems+' und' : '';
  });
}
function recalc(){ catalog.forEach(p=>updateSub(p.id)); recalcTotals(); }

function getDateRange(periodo){
  const now=new Date(); const y=now.getFullYear(); const m=now.getMonth();
  const d=now.getDay(); // 0=sun
  let from,to;
  if(periodo==='week'){
    const diff=d===0?6:d-1; // Monday start
    from=new Date(now); from.setDate(now.getDate()-diff); from.setHours(0,0,0,0);
    to=new Date(now); to.setHours(23,59,59,999);
  } else if(periodo==='lastweek'){
    const diff=d===0?6:d-1;
    to=new Date(now); to.setDate(now.getDate()-diff-1); to.setHours(23,59,59,999);
    from=new Date(to); from.setDate(to.getDate()-6); from.setHours(0,0,0,0);
  } else if(periodo==='month'){
    from=new Date(y,m,1); to=new Date(y,m+1,0,23,59,59,999);
  } else if(periodo==='lastmonth'){
    from=new Date(y,m-1,1); to=new Date(y,m,0,23,59,59,999);
  } else if(periodo==='custom'){
    const fd=document.getElementById('repDesde').value;
    const td=document.getElementById('repHasta').value;
    from=fd?new Date(fd+'T00:00:00'):new Date(0);
    to=td?new Date(td+'T23:59:59'):new Date();
  } else { // all
    from=new Date(0); to=new Date();
  }
  return {from,to};
}

function renderReporte(){
  const periodo=document.getElementById('repPeriodo').value;
  document.getElementById('customRange').style.display=periodo==='custom'?'flex':'none';
  const {from,to}=getDateRange(periodo);
  const history=loadHistory().filter(o=>{
    const d=new Date(o.ts||0); return d>=from&&d<=to;
  });
  const el=document.getElementById('repContent');
  if(!history.length){ el.innerHTML='<div class="rep-empty">Sin órdenes en este período.</div>'; return; }

  // Aggregate
  const cats=[...new Set(catalog.map(p=>p.cat))];
  const aggCat={}; const aggProd={};
  cats.forEach(c=>{ aggCat[c]={qty:0,monto:0}; });
  catalog.forEach(p=>{ aggProd[p.id]={qty:0,monto:0}; });
  let totalQty=0,totalMonto=0,totalOrdenes=history.length;
  history.forEach(o=>{
    (o.items||[]).forEach(it=>{
      const p=catalog.find(x=>x.id===it.id); if(!p)return;
      aggCat[p.cat].qty+=it.qty; aggCat[p.cat].monto+=it.sub||0;
      aggProd[p.id].qty+=it.qty; aggProd[p.id].monto+=it.sub||0;
      totalQty+=it.qty; totalMonto+=it.sub||0;
    });
  });

  const maxCatMonto=Math.max(...Object.values(aggCat).map(c=>c.monto),1);

  let html='<div class="rep-summary">';
  html+='<div class="rep-kpi"><div class="rep-kpi-val">'+totalOrdenes+'</div><div class="rep-kpi-label">Órdenes</div></div>';
  html+='<div class="rep-kpi"><div class="rep-kpi-val">'+totalQty.toLocaleString('es-AR')+'</div><div class="rep-kpi-label">Unidades</div></div>';
  html+='<div class="rep-kpi"><div class="rep-kpi-val">'+fmt(totalMonto)+'</div><div class="rep-kpi-label">Total</div></div>';
  html+='</div>';
  html+='<div class="pie-section"><div class="pie-toggle-row"><button class="pie-toggle active" id="ptMonto" onclick="switchPie(\'monto\')">💰 Por monto</button><button class="pie-toggle" id="ptQty" onclick="switchPie(\'qty\')">📦 Por unidades</button></div><div class="pie-container"><canvas id="pieChart" width="200" height="200" style="cursor:pointer"></canvas><div class="pie-legend" id="pieLegend"></div></div><div class="pie-tooltip" id="pieTooltip"></div></div>';

  // categories
  cats.forEach(cat=>{
    const c=aggCat[cat]; if(c.qty===0)return;
    const barW=Math.round((c.monto/maxCatMonto)*100);
    const prods=catalog.filter(p=>p.cat===cat&&aggProd[p.id].qty>0);
    const maxProdMonto=Math.max(...prods.map(p=>aggProd[p.id].monto),1);
    html+='<div class="rep-cat" id="rcat-'+cat.replace(/\s/g,'_')+'">';
    html+='<div class="rep-cat-header" onclick="this.parentElement.classList.toggle(\'open\')">';
    html+='<span>'+catIcons[cat]+'</span><span class="rep-cat-name">'+cat+'</span>';
    html+='<div class="rep-cat-totals"><div>'+c.qty.toLocaleString('es-AR')+' und</div><div>'+fmt(c.monto)+'</div></div>';
    html+='</div><div class="rep-cat-body">';
    html+='<div class="rep-col-header"><span style="flex:1">Producto</span><span style="width:60px;text-align:right">Cant</span><span style="width:80px;text-align:right">Monto</span></div>';
    prods.sort((a,b)=>aggProd[b.id].monto-aggProd[a.id].monto).forEach(p=>{
      const pd=aggProd[p.id];
      const bw=Math.round((pd.monto/maxProdMonto)*100);
      html+='<div class="rep-prod-row">';
      html+='<div class="rep-prod-name">'+p.label+' <span class="rep-prod-abbr">'+p.abbr+'</span></div>';
      html+='<div class="rep-bar-wrap"><div class="rep-bar" style="width:'+bw+'%"></div></div>';
      html+='<div class="rep-prod-qty">'+pd.qty+' und</div>';
      html+='<div class="rep-prod-monto">'+fmt(pd.monto)+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });

  el.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────

document.getElementById('numOrden').value=getNextNum();
document.getElementById('fechaOrden').value=new Date().toISOString().split('T')[0];
buildForm();
</script>
